<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация - CloudApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="auth-shell">
    <section class="auth-panel">
        <h1>Регистрация</h1>
        <p class="muted">Создайте аккаунт для работы с файлами и папками.</p>

        <form th:action="@{/register}" th:object="${form}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

            <label for="displayName">Имя</label>
            <input id="displayName" type="text" th:field="*{displayName}" autocomplete="name" required>
            <p class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></p>

            <label for="password">Пароль</label>
            <input id="password" type="password" th:field="*{password}" autocomplete="new-password" required>
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <button type="submit">Создать аккаунт</button>
        </form>

        <p class="switch">Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
    </section>
</main>
</body>
</html>
