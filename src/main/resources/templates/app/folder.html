<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${page.current.name} + ' - CloudApp'">CloudApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/app}">CloudApp</a>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="link-button" type="submit">Выйти</button>
    </form>
</header>

<main class="workspace">
    <section class="workspace-head">
        <nav class="breadcrumbs" aria-label="Путь к папке">
            <a th:each="item, iter : ${page.breadcrumbs}"
               th:href="@{/folders/{id}(id=${item.id})}"
               th:text="${iter.last ? item.name : item.name + ' / '}">Папка</a>
        </nav>
        <div class="folder-title-row">
            <div>
                <h1 th:text="${page.current.name}">Папка</h1>
                <p class="muted">
                    Владелец:
                    <span th:text="${email}">user@example.com</span>
                </p>
            </div>
            <a class="secondary-action"
               th:if="${page.parent != null}"
               th:href="@{/folders/{id}(id=${page.parent.id})}">Назад</a>
        </div>

        <div class="current-folder-actions" th:if="${!page.current.root}">
            <form th:action="@{/folders/{id}/rename(id=${page.current.id})}" method="post" class="rename-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="currentId" th:value="${page.current.id}">
                <label class="sr-only" for="current-folder-name">Новое название текущей папки</label>
                <input id="current-folder-name" name="name" type="text" th:value="${page.current.name}" required maxlength="120">
                <button type="submit">Переименовать</button>
            </form>

            <form th:action="@{/folders/{id}/delete(id=${page.current.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="currentId" th:value="${page.current.id}">
                <button class="danger-button" type="submit"
                        onclick="return confirm('Удалить текущую папку и все вложенные папки?')">Удалить текущую</button>
            </form>
        </div>
    </section>

    <div class="notice success" th:if="${message}" th:text="${message}"></div>
    <div class="notice" th:if="${error}" th:text="${error}"></div>

    <section class="folder-actions">
        <form th:action="@{/folders}" th:object="${folderForm}" method="post" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="parentId" th:value="${page.current.id}">
            <label class="sr-only" for="name">Название новой папки</label>
            <input id="name" type="text" th:field="*{name}" placeholder="Новая папка" required maxlength="120">
            <button type="submit">Создать</button>
        </form>
    </section>

    <section class="folder-list" aria-label="Папки">
        <div class="empty-state" th:if="${#lists.isEmpty(page.children)}">
            <h2>Здесь пока нет папок</h2>
            <p>Создайте первую папку, чтобы начать собирать структуру хранилища.</p>
        </div>

        <article class="folder-row" th:each="folder : ${page.children}">
            <a class="folder-link" th:href="@{/folders/{id}(id=${folder.id})}">
                <span class="folder-icon" aria-hidden="true"></span>
                <span>
                    <strong th:text="${folder.name}">Документы</strong>
                    <small th:text="${folder.childCount} + ' вложенных папок'">0 вложенных папок</small>
                </span>
            </a>

            <form th:action="@{/folders/{id}/rename(id=${folder.id})}" method="post" class="rename-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="currentId" th:value="${page.current.id}">
                <label class="sr-only" th:for="'rename-' + ${folder.id}">Новое название</label>
                <input th:id="'rename-' + ${folder.id}" name="name" type="text" th:value="${folder.name}" required maxlength="120">
                <button type="submit">Сохранить</button>
            </form>

            <form th:action="@{/folders/{id}/delete(id=${folder.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="currentId" th:value="${page.current.id}">
                <button class="danger-button" type="submit"
                        onclick="return confirm('Удалить папку и все вложенные папки?')">Удалить</button>
            </form>
        </article>
    </section>
</main>
</body>
</html>
